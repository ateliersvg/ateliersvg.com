<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3576a4"/>
      <stop offset="100%" stop-color="#5a31a0"/>
    </linearGradient>
  </defs>

  <!-- Background: matches site dark theme-color -->
  <rect width="1200" height="630" fill="#1e1e2e"/>

  <!-- Subtle dashed orbits, echoing the homepage hero -->
  <g transform="translate(600 250)" fill="none" stroke="#2a2a3a">
    <circle r="300" stroke-width="1" stroke-dasharray="6 10" opacity="0.55"/>
    <circle r="220" stroke-width="1" stroke-dasharray="4 7"  opacity="0.40"/>
    <circle r="150" stroke-width="1" stroke-dasharray="3 5"  opacity="0.28"/>
  </g>

  <!-- AS logo, centered horizontally, 220x220 -->
  <svg x="490" y="65" width="220" height="220" viewBox="0 0 354 363">
    <path fill="url(#logo-grad)" fill-rule="evenodd" clip-rule="evenodd" d="M94 130.04 142.695 6.514C103.469 14.98 86.877 40.825 82.5 76.655c-2.586 21.17 2.918 40.729 11.5 53.385M139.5 179c-14.621-11.562-35.038-33.532-45.5-48.96L37.699 268.641 25.5 280.372a159 159 0 0 0 5.429 5.171L0 362.757h72l15.72-43.28c7.43 2.786 15.19 5.223 23.28 7.33l-11 35.95h72.5c41.112-3.284 74.111-16.921 95.538-38.442L282 362.757h72L212.113 8.531C225.774 5.04 241.094 3.257 258 3.257h-48l2.113 5.274C188.198 14.644 169.365 25.997 156 42.203c-19.5 23.967-24 50.93-12 71.9 3.285 5.741 7.47 11.033 12.523 15.937zm0 0c16 10 49 25 49 25s33 11.5 33 34.5c0 32.551-32.5 38.876-74.5 37.378-14.395-.685-27.85-3.559-40.366-8.48zm17.023-48.96L177 73.66l31.287 86.143c-22.087-8.221-39.489-17.848-51.764-29.763m51.764 29.763q3.048 1.134 6.213 2.233 81 29.21 81 94.369c0 27.073-9.8 50.17-27.462 67.91zM106.634 267.398C91.763 261.551 78.218 252.813 66 241.426l-28.301 27.215-6.77 16.902c16.1 14.626 35.03 25.775 56.79 33.934zM142.695 6.514 144 0h31.5c-11.851 0-22.84 4.364-32.805 6.514"/>
  </svg>

  <!-- Wordmark: ATELIER (w-thin 200) + SVG (w-light 300), uppercase, 0.15em letter-spacing at 72px = ~11 -->
  <text x="600" y="385" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="72" text-anchor="middle" letter-spacing="11" fill="#ebebed">
    <tspan font-weight="200">ATELIER</tspan><tspan font-weight="300"> SVG</tspan>
  </text>

  <!-- Tagline: uppercase, very wide tracking (0.26em at 22px = ~6), w-medium -->
  <text x="600" y="445" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="22" text-anchor="middle" letter-spacing="6" font-weight="500" fill="#adb0b6">
    PHP OPEN SOURCE SVG TOOLKIT
  </text>

  <!-- Composer install: lowercase, monospace, ink-2 -->
  <text x="600" y="555" font-family="ui-monospace, 'SFMono-Regular', 'Cascadia Code', monospace"
        font-size="22" text-anchor="middle" fill="#757980">
    composer require <tspan fill="#3576a4">atelier/svg</tspan>
  </text>
</svg>
